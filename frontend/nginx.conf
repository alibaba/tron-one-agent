events {
    worker_connections 1024;
}

http {
    include       /etc/nginx/mime.types;
    default_type  application/octet-stream;

    # 日志格式
    log_format main '$remote_addr - $remote_user [$time_local] "$request" '
                    '$status $body_bytes_sent "$http_referer" '
                    '"$http_user_agent" "$http_x_forwarded_for"';

    access_log /var/log/nginx/access.log main;
    error_log /var/log/nginx/error.log;

    # Gzip 压缩
    gzip on;
    gzip_vary on;
    gzip_min_length 1024;
    gzip_types text/plain text/css application/json application/javascript text/xml application/xml application/xml+rss text/javascript;

    # 客户端最大上传文件大小
    client_max_body_size 100M;

    # 启用高效文件传输
    sendfile on;
    tcp_nopush on;
    tcp_nodelay on;
    keepalive_timeout 65;

    # 默认站点配置
    server {
        listen 80;
        server_name localhost;

        # 首页重定向
        location / {
            return 301 /client/;
        }

        # Client 前端 API 代理（/client/api/ -> END_POINT/api/）
        # ^~ 确保优先于 /client/ 的 try_files 拦截
        location ^~ /client/api/ {
            proxy_pass http://${END_POINT}/api/;
            proxy_http_version 1.1;
            proxy_set_header Upgrade $http_upgrade;
            proxy_set_header Connection 'upgrade';
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
            proxy_cache_bypass $http_upgrade;
        }

        # Control 前端 API 代理（/api/ -> END_POINT/api/）
        location /api/ {
            proxy_pass http://${END_POINT}/;
            proxy_http_version 1.1;
            proxy_set_header Upgrade $http_upgrade;
            proxy_set_header Connection 'upgrade';
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
            proxy_cache_bypass $http_upgrade;
        }
        # SSE 接口代理（/chatApi/ -> END_POINT/api/），关闭缓冲以支持流式响应
        location ^~ /chatApi/ {
            proxy_pass http://${END_POINT}/;
            proxy_http_version 1.1;
            proxy_set_header Upgrade $http_upgrade;
            proxy_set_header Connection 'upgrade';
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
            proxy_cache_bypass $http_upgrade;
            # SSE 必须关闭代理缓冲
            proxy_buffering off;
            proxy_cache off;
            proxy_read_timeout 3600s;
        }

        # Client 应用
        location /client/ {
            alias /usr/share/nginx/html/client/;
            try_files $uri $uri/ /client/index.html;
        }

        # Control 应用
        location /control/ {
            alias /usr/share/nginx/html/control/;
            try_files $uri $uri/ /control/index.html;
        }
    }
}
